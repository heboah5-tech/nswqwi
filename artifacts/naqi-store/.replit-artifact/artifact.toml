kind = "web"
previewPath = "/"
title = "Naqi Store"
version = "1.0.0"
id = "artifacts/naqi-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25459

[services.development]
run = "pnpm --filter @workspace/naqi-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naqi-store", "run", "build" ]
publicDir = "artifacts/naqi-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25459"
BASE_PATH = "/"
